name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 같은 브랜치에서 새 커밋이 푸시되면 진행 중인 오래된 실행을 취소한다.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 아키텍처 규칙 + assets JSON — 가장 값싼 검사, 제일 먼저 ──────────
  arch-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 아키텍처 규칙 & QA JSON 검증
        run: ./scripts/claude/arch-check.sh

  # ── 단위 테스트 ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: 단위 테스트
        run: ./gradlew testDebugUnitTest
      - name: 테스트 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: app/build/reports/tests/

  # ── Lint ─────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Android Lint
        run: ./gradlew lint
      - name: Lint 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html

  # ── 빌드 (테스트/린트 통과 후) ───────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [ arch-check, test, lint ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Debug APK 빌드
        run: ./gradlew assembleDebug
      - name: Debug APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  # ── 계측 테스트 (에뮬레이터) ─────────────────────────────────────
  # PR에서는 느려서 건너뛰고, main 푸시에서만 돈다. TTS/녹음 등 실기기
  # 동작을 검증하는 유일한 수단이라 CI에 유지한다.
  instrumented-test:
    runs-on: ubuntu-latest
    needs: [ arch-check ]
    if: github.event_name == 'push'
    strategy:
      matrix:
        api-level: [ 29 ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      # KVM 하드웨어 가속 활성화 (에뮬레이터 속도 확보)
      - name: KVM 권한 설정
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD 캐시
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: AVD 스냅샷 생성 (캐시 미스 시)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD 스냅샷 생성 완료"

      - name: 계측 테스트
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: 계측 테스트 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/
